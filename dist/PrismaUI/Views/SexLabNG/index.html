<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SexLabNG Actor Enjoyment</title>
    <link rel="stylesheet" href="./styles.css" />
</head>

<body>
    <main class="app">
        <section class="card">
            <header class="card__header">
                <h1>当前 Actor 状态</h1>
                <button id="refreshBtn" type="button">刷新</button>
            </header>

            <div class="metric">
                <p class="metric__label">Enjoyment</p>
                <p id="enjoymentValue" class="metric__value metric__value--neutral">--</p>
                <p class="metric__range">范围: -100 ~ 100</p>
            </div>

            <div class="metric metric--small">
                <p class="metric__label">Degree</p>
                <p id="degreeValue" class="metric__degree">--</p>
            </div>

            <p id="statusText" class="status">等待数据...</p>
        </section>
    </main>

    <script src="./app.js" defer></script>
</body>

</html>
